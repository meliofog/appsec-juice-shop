# This workflow integrates Static Application Security Testing (SAST) using Semgrep.
# It identifies OWASP Top 10 vulnerabilities, specifically targeting issues 
# like DOM XSS and unsafe Angular methods discovered in this project.

name: "SAST - Semgrep Security Scan"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 18 * * 1' # Every Monday at 18:30 UTC

jobs:
  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    
    permissions:
      contents: read       # To checkout the code
      security-events: write # To upload the SARIF results
      actions: read        # useful for internal tracking

    # Condition: Run if it's not a push, OR if it is a push and doesn't have [skip ci]
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/owasp-top-10
            p/angularjs
          generateSarif: "1"

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4  
        if: always()
        with:
          sarif_file: semgrep.sarif
