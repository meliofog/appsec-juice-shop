# This workflow integrates Static Application Security Testing (SAST) and 
# Software Composition Analysis (SCA). It identifies OWASP Top 10 vulnerabilities 
# and audits third-party dependencies.

name: "Security Pipeline - SAST & SCA"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 18 * * 1' # Every Monday at 18:30 UTC

jobs:
  security_scan:
    name: Semgrep & Dependency Audit
    runs-on: ubuntu-latest
    
    permissions:
      contents: read       
      security-events: write 
      actions: read        

    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (Current LTS 24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # --- Phase 1: Dependency Scan (SCA) ---
      - name: Run Dependency Audit (SCA)
        run: |
          chmod +x ./pipeline/scan-deps.sh
          ./pipeline/scan-deps.sh

      # --- Phase 2: Static Analysis (SAST) ---
      - name: Run Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/owasp-top-10
            p/angularjs
          generateSarif: "1"

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4  
        if: always()
        with:
          sarif_file: semgrep.sarif
